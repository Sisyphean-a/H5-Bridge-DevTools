objective: "实现同 origin 多页面实时同步，以及桥接响应图片上传与格式切换能力"
start_point: "当前存储已按 origin 共享，但已打开页面与 DevTools 不会自动消费其他页面写入的新状态；响应编辑器仅支持手工 JSON。"
